services:

  # ── TINE sine-wave test device server ───────────────────────────────────────
  # Runs the official jsineServer from the TINE distribution.
  # Exports Sine, Amplitude, Frequency, Noise properties on 10 devices.
  #
  # Context: TEST  |  Server: JSINESRV  |  Devices: SINEDEV_0 .. SINEDEV_9
  # Client address (direct, no TNS): /TEST/JSINESRV/SINEDEV_0@jsinesrv
  #
  # Build: docker compose build
  # Start: docker compose up -d
  # Stop:  docker compose down

  jsinesrv:
    build:
      context: docker/
    image: rxtine-testserver:latest
    container_name: jsinesrv
    hostname: jsinesrv                # used in client @jsinesrv addressing
    ports:
      - "7000:7000"                   # TINE server TCP port
    volumes:
      # Override config without rebuilding: place edited files in docker/config/
      # and uncomment the line below.
      # - ./docker/config:/tine-config:ro
      []
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7000"]
      interval: 5s
      timeout: 3s
      retries: 5
