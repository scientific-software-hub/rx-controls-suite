# TINE server configuration
# tine.home must point to the directory containing this file.
# Pass as: java -Dtine.home=/tine-config

# Context and server identity (must match fecid.csv)
tine.context=TEST
tine.fecname=RXTEST

# Disable TNS (name service) lookups — clients use direct @host addressing
# For a full TNS setup, set tine.nameservice=<tns-host>
tine.nameservice=localhost
tine.nameservice.disable=true

# Server TCP port (default 7000; change if it conflicts)
tine.port=7000

# Logging
tine.loglevel=WARN
